version: "3.9"

services:
  app:
    image: ghcr.io/${GITHUB_REPO}/ai-chat-api:${IMAGE_TAG:-latest}
    build: null
    environment:
      - APP_ENV=production
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
